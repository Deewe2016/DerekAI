<!DOCTYPE html>
<html>
<head>
    <title>DerekAI</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #f0f2f5; 
            font-family: sans-serif;
            overflow: hidden; 
        }
        
        .chat-container { 
            width: 100%; 
            height: 100%;
            background: white; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }
        
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0; 
            margin-bottom: 15px;
            font-size: 28px; 
        }
        
        #chatbox { 
            flex-grow: 1;
            overflow-y: auto; 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            background: #fafafa; 
            font-size: 16px;
        }
        
        .input-area { 
            display: flex; 
            gap: 12px; 
            margin-top: auto;
        }
        
        input { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            outline: none; 
            font-size: 16px; 
        }
        
        button { 
            padding: 15px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button:hover { background: #0056b3; }
        .msg { margin: 10px 0; padding: 12px 18px; border-radius: 10px; max-width: 75%; word-wrap: break-word; line-height: 1.5; }
        .user-msg { background: #e1ffc7; margin-left: auto; text-align: right; }
        .ai-msg { background: #eedfff; }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>🤖 DerekAI</h2>
        <div id="chatbox">
            <div class="msg ai-msg"><strong>DerekAI:</strong> Ask me a yes/no question! I've been loaded with tons of general knowledge.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userQuestion" placeholder="Type a question..." onkeypress="handleKeyPress(event)">
            <button onclick="askAI()">Send</button>
        </div>
    </div>

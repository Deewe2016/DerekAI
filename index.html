<!DOCTYPE html>
<html>
<head>
    <title>DerekAI v4</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #f0f2f5; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }
        
        .chat-container { 
            width: 100%; 
            height: 100%;
            background: white; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }
        
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0; 
            margin-bottom: 15px;
            font-size: 28px; 
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        
        #chatbox { 
            flex-grow: 1;
            overflow-y: auto; 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            background: #fafafa; 
            font-size: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }
        
        .input-area { 
            display: flex; 
            gap: 12px; 
            margin-top: auto;
        }
        
        input { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            outline: none; 
            font-size: 16px; 
        }
        
        button { 
            padding: 15px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button:hover { background: #0056b3; }

        .message-wrapper {
            display: flex;
            align-items: flex-end; 
            gap: 10px;
        }

        .msg-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%; 
            object-fit: cover; 
            flex-shrink: 0; 
            border: 1px solid #ddd;
        }

        .speech-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            position: relative; 
        }

        .user-message {
            flex-direction: row-reverse; 
        }
        .user-message .speech-bubble {
            background-color: #007bff; 
            color: white;
            border-bottom-right-radius: 5px; 
        }
        .user-message .speech-bubble::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 10px solid #007bff;
            border-top: 10px solid transparent;
        }

        .ai-message {
            flex-direction: row; 
        }
        .ai-message .speech-bubble {
            background-color: #e9ecef; 
            color: #333;
            border-bottom-left-radius: 5px; 
        }
        .ai-message .speech-bubble::after {
            content: '';
            position: absolute;
            left: -8px;
            bottom: 0;
            width: 0;
            height: 0;
            border-right: 10px solid #e9ecef;
            border-top: 10px solid transparent;
        }

        .bubble-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .ai-message .bubble-name { color: #007bff; }
        .user-message .bubble-name { color: white; }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2>🤖 DerekAI</h2>
        <div id="chatbox">
            <div class="message-wrapper ai-message">
                <img src="https://via.placeholder.com/100/eeeeee/000000?text=DerekAI" alt="DerekAI" class="msg-logo">
                <div class="speech-bubble">
                    <span class="bubble-name">DerekAI</span>
                    Hello! Ask me absolutely anything, from math problems to writing stories!
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userQuestion" placeholder="Ask anything..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="askAI()">Send</button>
        </div>
    </div>

    <script>
        const derekAiLogoUrl = "https://via.placeholder.com/100/eeeeee/000000?text=DerekAI";
        const userLogoUrl = "https://via.placeholder.com/100/007bff/ffffff?text=YOU";

        function appendMessage(senderName, text, isUser) {
            const chatbox = document.getElementById("chatbox");
            const wrapperDiv = document.createElement("div");
            wrapperDiv.classList.add("message-wrapper");
            wrapperDiv.classList.add(isUser ? "user-message" : "ai-message");

            const logoImg = document.createElement("img");
            logoImg.alt = senderName;
            logoImg.classList.add("msg-logo");
            logoImg.src = isUser ? userLogoUrl : derekAiLogoUrl;
            wrapperDiv.appendChild(logoImg);

            const bubbleDiv = document.createElement("div");
            bubbleDiv.classList.add("speech-bubble");

            const nameSpan = document.createElement("span");
            nameSpan.classList.add("bubble-name");
            nameSpan.innerText = senderName;
            bubbleDiv.appendChild(nameSpan);

            const textSpan = document.createElement("span");
            textSpan.innerText = text;
            bubbleDiv.appendChild(textSpan);

            wrapperDiv.appendChild(bubbleDiv);
            chatbox.appendChild(wrapperDiv);
            chatbox.scrollTop = chatbox.scrollHeight;

            return textSpan; 
        }

        async function askAI() {
            const inputField = document.getElementById("userQuestion");
            const sendBtn = document.getElementById("sendBtn");
            const rawText = inputField.value.trim();
            if (!rawText) return;

            appendMessage("You", rawText, true);
            inputField.value = "";

            sendBtn.disabled = true;
            inputField.disabled = true;
            sendBtn.innerText = "...";

            const responseTextNode = appendMessage("DerekAI", "Thinking...", false);

            try {
                // Using a super reliable, alternative free chat API endpoint
                const response = await fetch(`https://open-api-one.vercel.app/api/chat?model=gpt-4o-mini&prompt=${encodeURIComponent(rawText)}`);
                const data = await response.json();
                
                if (data && data.reply) {
                    responseTextNode.innerText = data.reply;
                } else if (data && data.result) {
                    responseTextNode.innerText = data.result;
                } else {
                    responseTextNode.innerText = "I received an empty answer. Can you try again?";
                }

            } catch (error) {
                console.error('Error:', error);
                responseTextNode.innerText = "Connection lost! Try asking me again in a moment.";
            }

            sendBtn.disabled = false;
            inputField.disabled = false;
            sendBtn.innerText = "Send";
            inputField.focus();
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                askAI();
            }
        }
    </script>
</body>
</html>

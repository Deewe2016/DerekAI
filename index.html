<!DOCTYPE html>
<html>
<head>
    <title>DerekAI v4</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #f0f2f5; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }
        
        .chat-container { 
            width: 100%; 
            height: 100%;
            background: white; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }
        
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0; 
            margin-bottom: 15px;
            font-size: 28px; 
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        
        #chatbox { 
            flex-grow: 1;
            overflow-y: auto; 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            background: #fafafa; 
            font-size: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* space between bubbles */
        }
        
        .input-area { 
            display: flex; 
            gap: 12px; 
            margin-top: auto;
        }
        
        input { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 20px; /* rounded input */
            outline: none; 
            font-size: 16px; 
        }
        
        button { 
            padding: 15px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button:hover { background: #0056b3; }

        /* --- NEW SPEECH BUBBLE STYLING --- */

        /* Wrapper for logo + bubble */
        .message-wrapper {
            display: flex;
            align-items: flex-end; /* Align to bottom of bubble */
            gap: 10px;
        }

        /* Logos/Avatars */
        .msg-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%; /* Perfect circle */
            object-fit: cover; /* Images fill the circle */
            flex-shrink: 0; /* Logos don't squeeze */
            border: 1px solid #ddd;
        }

        /* Speech Bubble Base */
        .speech-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            position: relative; /* Needed for the little pointer triangle */
        }

        /* Specific bubble colors and pointers */
        .user-message {
            flex-direction: row-reverse; /* Put logo on the right */
        }
        .user-message .speech-bubble {
            background-color: #007bff; /* Bright blue for you */
            color: white;
            border-bottom-right-radius: 5px; /* Pointer shape */
        }
        /* Triangle pointer for user */
        .user-message .speech-bubble::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 10px solid #007bff;
            border-top: 10px solid transparent;
        }

        .ai-message {
            flex-direction: row; /* Put logo on the left */
        }
        .ai-message .speech-bubble {
            background-color: #e9ecef; /* Light grey for AI */
            color: #333;
            border-bottom-left-radius: 5px; /* Pointer shape */
        }
        /* Triangle pointer for AI */
        .ai-message .speech-bubble::after {
            content: '';
            position: absolute;
            left: -8px;
            bottom: 0;
            width: 0;
            height: 0;
            border-right: 10px solid #e9ecef;
            border-top: 10px solid transparent;
        }

        /* Strong names inside bubbles */
        .bubble-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .ai-message .bubble-name { color: #007bff; }
        .user-message .bubble-name { color: white; }

    </style>
</head>
<body>

    <div class="chat-container">
        <h2>🤖 DerekAI</h2>
        <div id="chatbox">
            <div class="message-wrapper ai-message">
                <img src="https://via.placeholder.com/100/eeeeee/000000?text=DerekAI" alt="DerekAI" class="msg-logo">
                <div class="speech-bubble">
                    <span class="bubble-name">DerekAI</span>
                    Hello! I'm now powered by a live AI model. Ask me absolutely anything, from math problems to writing stories!
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userQuestion" placeholder="Ask anything..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="askAI()">Send</button>
        </div>
    </div>

    <script>
        // --- ADD YOUR LOGO LINKS HERE ---
        // Right now, they use generic placeholder images!
        const derekAiLogoUrl = "https://via.placeholder.com/100/eeeeee/000000?text=DerekAI";
        const userLogoUrl = "https://via.placeholder.com/100/007bff/ffffff?text=YOU";

        function appendMessage(senderName, text, isUser, isThinking = false) {
            const chatbox = document.getElementById("chatbox");
            
            // 1. Create the wrapper
            const wrapperDiv = document.createElement("div");
            wrapperDiv.classList.add("message-wrapper");
            wrapperDiv.classList.add(isUser ? "user-message" : "ai-message");

            // 2. Create and set up the logo image
            const logoImg = document.createElement("img");
            logoImg.alt = senderName;
            logoImg.classList.add("msg-logo");
            logoImg.src = isUser ? userLogoUrl : derekAiLogoUrl;
            wrapperDiv.appendChild(logoImg);

            // 3. Create the speech bubble
            const bubbleDiv = document.createElement("div");
            bubbleDiv.classList.add("speech-bubble");
            if (isThinking) bubbleDiv.id = "aiThinkingBubble"; // Special ID to find it later

            // 4. Create the name label inside the bubble
            const nameSpan = document.createElement("span");
            nameSpan.classList.add("bubble-name");
            nameSpan.innerText = senderName;
            bubbleDiv.appendChild(nameSpan);

            // 5. Add the actual text to the bubble
            const textNode = document.createTextNode(text);
            bubbleDiv.appendChild(textNode);

            wrapperDiv.appendChild(bubbleDiv);
            chatbox.appendChild(wrapperDiv);

            // Auto-scroll to the bottom
            chatbox.scrollTop = chatbox.scrollHeight;

            return bubbleDiv; // Return the bubble itself, not the wrapper!
        }

        async function askAI() {
            const inputField = document.getElementById("userQuestion");
            const sendBtn = document.getElementById("sendBtn");
            const rawText = inputField.value.trim();
            if (!rawText) return;

            // Display user message with logos and clearing input
            appendMessage("You", rawText, true);
            inputField.value = "";

            // Disable button & input while AI is "thinking"
            sendBtn.disabled = true;
            inputField.disabled = true;
            sendBtn.innerText = "...";

            // Add a temporary "thinking" bubble
            // Notice: We pass the return value (the bubble div) to this variable!
            const thinkingBubble = appendMessage("DerekAI", "Thinking...", false, true);

            try {
                // Fetch live from a free ChatGPT-style API
                const response = await fetch(`https://free-unoficial-gpt4o-mini-api-g70n.onrender.com/chat/?query=${encodeURIComponent(rawText)}`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                const data = await response.json();
                
                // Replace "Thinking..." with the real answer from the AI!
                if (data && data.results) {
                    thinkingBubble.innerHTML = `<span class="bubble-name">DerekAI</span> ${data.results}`;
                } else if (data && data.reply) {
                    thinkingBubble.innerHTML = `<span class="bubble-name">DerekAI</span> ${data.reply}`;
                } else {
                    thinkingBubble.innerHTML = `<span class="bubble-name">DerekAI</span> I received an empty answer. Can you try again?`;
                }

            } catch (error) {
                console.error('Error:', error);
                thinkingBubble.innerHTML = `<span class="bubble-name">DerekAI</span> Oh no! My connection to the brain was interrupted. Please try again!`;
            }

            // Re-enable inputs
            sendBtn.disabled = false;
            inputField.disabled = false;
            sendBtn.innerText = "Send";
            inputField.focus();
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                askAI();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>DerekAI v4</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #f0f2f5; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }
        
        .chat-container { 
            width: 100%; 
            height: 100%;
            background: white; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }
        
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0; 
            margin-bottom: 15px;
            font-size: 28px; 
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        
        #chatbox { 
            flex-grow: 1;
            overflow-y: auto; 
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            background: #fafafa; 
            font-size: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }
        
        .input-area { 
            display: flex; 
            gap: 12px; 
            margin-top: auto;
        }
        
        input { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            outline: none; 
            font-size: 16px; 
        }
        
        button { 
            padding: 15px 30px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button:hover { background: #0056b3; }

        .message-wrapper {
            display: flex;
            align-items: flex-end; 
            gap: 10px;
        }

        .msg-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%; 
            object-fit: cover; 
            flex-shrink: 0; 
            border: 1px solid #ddd;
        }

        .speech-bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            position: relative; 
        }

        .user-message {
            flex-direction: row-reverse; 
        }
        .user-message .speech-bubble {
            background-color: #007bff; 
            color: white;
            border-bottom-right-radius: 5px; 
        }
        .user-message .speech-bubble::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 10px solid #007bff;
            border-top: 10px solid transparent;
        }

        .ai-message {
            flex-direction: row; 
        }
        .ai-message .speech-bubble {
            background-color: #e9ecef; 
            color
